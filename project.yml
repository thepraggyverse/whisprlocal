name: WhisprLocal

options:
  bundleIdPrefix: com.praggy.whisprlocal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

# SwiftPM packages — WhisperKit lands in M2 (ADR-002). MLX strategy resolved
# at M3 (ADR-001). The argmax-oss-swift package is the canonical home of
# WhisperKit after upstream's March 2026 multi-kit reorg; we depend on the
# WhisperKit product only (not the ArgmaxOSS umbrella, not TTSKit/SpeakerKit)
# to keep the binary lean and avoid unrelated open issues.
packages:
  WhisprShared:
    path: Shared
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift
    exactVersion: 0.18.0

# Project-wide build settings. Per-target overrides below.
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      # iOS Simulator supports ad-hoc signing ("-") with zero cert setup,
      # and signing is REQUIRED for entitlements (and thus App Group
      # access) to attach to the binary. We force ad-hoc for Debug so
      # sim builds get the .entitlements file embedded without needing a
      # real developer identity (which would make CI brittle). Device
      # Debug builds should override this in Xcode if needed.
      CODE_SIGN_IDENTITY: "-"
      AD_HOC_CODE_SIGNING_ALLOWED: YES
      CODE_SIGN_STYLE: Automatic
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O
      CODE_SIGN_STYLE: Automatic

targets:

  # --- Main app ----------------------------------------------------------
  WhisprLocalApp:
    type: application
    platform: iOS
    sources:
      - path: WhisprLocalApp/App
      - path: WhisprLocalApp/Features
        optional: true
      - path: WhisprLocalApp/Core
        optional: true
      - path: WhisprLocalApp/DesignSystem
        optional: true
      - path: WhisprLocalApp/Resources
        optional: true
    dependencies:
      - package: WhisprShared
        product: WhisprShared
      - package: ArgmaxOSS
        product: WhisperKit
      - target: WhisprKeyboard
        embed: true
    info:
      path: WhisprLocalApp/Info.plist
      properties:
        CFBundleDisplayName: WhisprLocal
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "WhisprLocal uses the microphone to transcribe your speech entirely on-device. No audio ever leaves your iPhone."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            huggingface.co:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
            cdn-lfs.huggingface.co:
              NSIncludesSubdomains: false
              NSExceptionAllowsInsecureHTTPLoads: false
        CFBundleURLTypes:
          - CFBundleURLName: com.praggy.whisprlocal
            CFBundleURLSchemes:
              - whisprlocal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praggy.whisprlocal.app
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: WhisprLocalApp/WhisprLocalApp.entitlements
      configs:
        Debug:
          # Target-level overrides xcodegen's implicit "iPhone Developer"
          # default so sim Debug builds use ad-hoc signing and attach the
          # entitlements file. Rationale in the project-level Debug config.
          CODE_SIGN_IDENTITY: "-"
    scheme:
      testTargets:
        - WhisprLocalAppTests
        - WhisprLocalAppUITests
      gatherCoverageData: true

  # --- Keyboard extension ------------------------------------------------
  # CRITICAL: this target must never link WhisperKit, MLX, CoreML (directly),
  # or any ML framework. It stays under 48 MB runtime memory. Only WhisprShared.
  WhisprKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: WhisprKeyboard
        excludes:
          - "*.entitlements"
    dependencies:
      - package: WhisprShared
        product: WhisprShared
    info:
      path: WhisprKeyboard/Info.plist
      properties:
        CFBundleDisplayName: WhisprKeyboard
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praggy.whisprlocal.app.keyboard
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: WhisprKeyboard/WhisprKeyboard.entitlements
      configs:
        Debug:
          # See WhisprLocalApp target for rationale — sim Debug must use
          # ad-hoc signing for the app-groups entitlement to embed.
          CODE_SIGN_IDENTITY: "-"

  # --- Tests -------------------------------------------------------------
  WhisprLocalAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WhisprLocalApp/Tests
        excludes:
          - "Fixtures/**"
    dependencies:
      - target: WhisprLocalApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praggy.whisprlocal.app.Tests
        # Signing is now on for Debug, so test bundles need an Info.plist
        # to sign. Let Xcode synthesize one — we have no reason to hand-
        # write one for a test bundle.
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"

  WhisprLocalAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WhisprLocalApp/UITests
    dependencies:
      - target: WhisprLocalApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praggy.whisprlocal.app.UITests
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
