name: WhisprLocal

options:
  bundleIdPrefix: com.praggy.whisprlocal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

# SwiftPM packages — local only at M0. WhisperKit lands at M2, MLX strategy
# resolved at M3. See docs/DECISIONS.md ADR-001.
packages:
  WhisprShared:
    path: Shared

# Project-wide build settings. Per-target overrides below.
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      CODE_SIGNING_ALLOWED: NO
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O
      CODE_SIGN_STYLE: Automatic

targets:

  # --- Main app ----------------------------------------------------------
  WhisprLocalApp:
    type: application
    platform: iOS
    sources:
      - path: WhisprLocalApp/App
      - path: WhisprLocalApp/Features
        optional: true
      - path: WhisprLocalApp/Core
        optional: true
      - path: WhisprLocalApp/DesignSystem
        optional: true
      - path: WhisprLocalApp/Resources
        optional: true
    dependencies:
      - package: WhisprShared
        product: WhisprShared
      - target: WhisprKeyboard
        embed: true
    info:
      path: WhisprLocalApp/Info.plist
      properties:
        CFBundleDisplayName: WhisprLocal
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "WhisprLocal uses the microphone to transcribe your speech entirely on-device. No audio ever leaves your iPhone."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            huggingface.co:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
            cdn-lfs.huggingface.co:
              NSIncludesSubdomains: false
              NSExceptionAllowsInsecureHTTPLoads: false
        CFBundleURLTypes:
          - CFBundleURLName: com.praggy.whisprlocal
            CFBundleURLSchemes:
              - whisprlocal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praggy.whisprlocal.app
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: WhisprLocalApp/WhisprLocalApp.entitlements
    scheme:
      testTargets:
        - WhisprLocalAppTests
        - WhisprLocalAppUITests
      gatherCoverageData: true

  # --- Keyboard extension ------------------------------------------------
  # CRITICAL: this target must never link WhisperKit, MLX, CoreML (directly),
  # or any ML framework. It stays under 48 MB runtime memory. Only WhisprShared.
  WhisprKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: WhisprKeyboard
        excludes:
          - "*.entitlements"
    dependencies:
      - package: WhisprShared
        product: WhisprShared
    info:
      path: WhisprKeyboard/Info.plist
      properties:
        CFBundleDisplayName: WhisprKeyboard
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praggy.whisprlocal.app.keyboard
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: WhisprKeyboard/WhisprKeyboard.entitlements

  # --- Tests -------------------------------------------------------------
  WhisprLocalAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WhisprLocalApp/Tests
        excludes:
          - "Fixtures/**"
    dependencies:
      - target: WhisprLocalApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praggy.whisprlocal.app.Tests

  WhisprLocalAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WhisprLocalApp/UITests
    dependencies:
      - target: WhisprLocalApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.praggy.whisprlocal.app.UITests
